<!DOCTYPE html>
<html lang="ko">
<head>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <a href="siwol-yoga.html" class="logo">시월요가</a>

  <main class="page-content schedule-page">
    <h1 class="page-title">시간표</h1>

    <div class="level-legend">

    <div class="timetable">

        <div class="tt-day">화</div>
        <div class="tt-day">수</div>
        <div class="tt-day">목</div>
        <div class="tt-day">금</div>
        <div class="tt-day tt-day--weekend">토</div>
        <div class="tt-day tt-day--weekend">일</div>
      </div>

      <div class="tt-row">
        <div class="tt-time">오전</div>
        <div class="tt-cell tt-filled tt-level-1">
          <span class="tt-hour">10:00</span>
          <span class="tt-name">테라피</span>
        </div>
        <div class="tt-cell"></div>

        </div>
        <div class="tt-cell"></div>
        <div class="tt-cell tt-filled tt-level-2">
          <span class="tt-hour">11:00</span>
          <span class="tt-name">빈야사</span>
          <span class="tt-duration">70분</span>
        </div>
      </div>

      <div class="tt-row">
        <div class="tt-time">저녁</div>
        <div class="tt-cell tt-filled tt-level-2">
          <span class="tt-hour">19:00</span>
          <span class="tt-name">빈야사</span>
        </div>
        <div class="tt-cell tt-filled tt-level-1">
          <span class="tt-hour">19:00</span>
          <span class="tt-name">테라피</span>
        </div>
        <div class="tt-cell tt-filled tt-level-2">
          <span class="tt-hour">19:00</span>
          <span class="tt-name">빈야사</span>
        </div>
        <div class="tt-cell tt-filled tt-level-1">
          <span class="tt-hour">19:00</span>
          <span class="tt-name">테라피</span>
        </div>
        <div class="tt-cell tt-filled tt-level-2">
          <span class="tt-hour">19:00</span>
          <span class="tt-name">빈야사</span>
          <span class="tt-duration">70분</span>
        </div>
        <div class="tt-cell"></div>
        <div class="tt-cell"></div>
      </div>

      <div class="tt-row">
        <div class="tt-time"></div>
        <div class="tt-cell tt-filled tt-level-1">
          <span class="tt-hour">20:15</span>
          <span class="tt-name">테라피</span>
        </div>
        <div class="tt-cell tt-filled tt-level-3">
          <span class="tt-hour">20:15</span>
          <span class="tt-name">에볼루션</span>
        </div>
        <div class="tt-cell tt-filled tt-level-1">
          <span class="tt-hour">20:15</span>
          <span class="tt-name">테라피</span>
        </div>
        <div class="tt-cell tt-filled tt-level-3">
          <span class="tt-hour">20:15</span>
          <span class="tt-name">에볼루션</span>
        </div>
        <div class="tt-cell"></div>
        <div class="tt-cell"></div>
        <div class="tt-cell"></div>
      </div>
    </div>

    <div class="private-section">
      <h2 class="sub-title">개인 레슨</h2>
      <div class="private-grid">
        <div class="private-item">
          <span class="private-type">1:1</span>
          <span class="private-desc">시간 협의</span>
        </div>
        <div class="private-item">
          <span class="private-type">2:1</span>
          <span class="private-desc">시간 협의</span>
        </div>
      </div>
      <p class="private-contact">문의 @siwol.yoga</p>
    </div>
  </main>

  <footer class="footer">
    <span>© 2026 시월요가</span>
  </footer>

  <script>
    const menuBtn = document.querySelector('.menu-btn');
    const gnb = document.querySelector('.gnb');
    menuBtn.addEventListener('click', () => {
      gnb.classList.toggle('open');
      menuBtn.classList.toggle('active');
    });
    document.querySelectorAll('.gnb a').forEach(a => {
      a.addEventListener('click', () => {
        gnb.classList.remove('open');
        menuBtn.classList.remove('active');
      });
    });
  </script>
</body>
</html>
