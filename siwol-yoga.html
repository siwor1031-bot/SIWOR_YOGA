<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시월요가 SIWOL YOGA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500&family=Noto+Sans+KR:wght@100;200;300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <a href="siwol-yoga.html" class="logo">시월요가</a>
    <nav class="gnb">
      <a href="about.html">소개</a>
      <a href="schedule.html">시간표</a>
      <a href="price.html">수강료</a>
      <a href="notice.html">유의사항</a>
    </nav>
    <button class="menu-btn" aria-label="메뉴 열기">
      <span></span><span></span>
    </button>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <h1 class="hero-title">시월</h1>
      <p class="hero-desc">계절이 때에 맞춰 오듯,<br>때에 맞는 움직임과 쉼을 추구합니다.</p>
      <p class="hero-sub">소수 정원 요가 · 서대문 홍제</p>
      <div class="hero-links">
        <a href="schedule.html">시간표</a>
        <a href="price.html">수강료</a>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container contact-area">
      <p class="contact-address">서울 서대문구 홍제동 · 무학빌딩 1층</p>
      <p class="contact-sns">@siwol.yoga</p>
      <a href="https://map.naver.com/p/search/%EC%9A%94%EA%B0%80%EC%88%B2/place/1077329612" target="_blank" class="map-link">네이버 지도 →</a>
    </div>
  </section>

  <footer class="footer">
    <span>© 2026 시월요가</span>
  </footer>

  <script>
    const menuBtn = document.querySelector('.menu-btn');
    const gnb = document.querySelector('.gnb');
    menuBtn.addEventListener('click', () => {
      gnb.classList.toggle('open');
      menuBtn.classList.toggle('active');
    });
    document.querySelectorAll('.gnb a').forEach(a => {
      a.addEventListener('click', () => {
        gnb.classList.remove('open');
        menuBtn.classList.remove('active');
      });
    });
  </script>
</body>
</html>
