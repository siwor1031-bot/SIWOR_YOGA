<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소개 — 시월요가</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&family=Noto+Sans+KR:wght@100;200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <a href="siwol-yoga.html" class="logo">시월요가</a>
    <nav class="gnb">
      <a href="about.html" class="active">소개</a>
      <a href="schedule.html">시간표</a>
      <a href="price.html">수강료</a>
      <a href="notice.html">유의사항</a>
    </nav>
    <button class="menu-btn" aria-label="메뉴 열기">
      <span></span><span></span>
    </button>
  </header>

  <main class="page-content">
    <h1 class="page-title">소개</h1>

    <p class="about-lead">몸에도 계절이 있습니다.</p>
    <p class="about-body">시월은 그 때에 맞는 움직임을 찾아주는 곳입니다.<br>
    소수 정원. 개인 피드백. 당신의 속도만 존재합니다.</p>

    <div class="about-programs">
      <div class="program-line"><span>테라피</span><span>긴장을 풀고 균형을 되찾는 시간</span></div>
      <div class="program-line"><span>빈야사</span><span>호흡과 움직임이 하나가 되는 흐름</span></div>
      <div class="program-line"><span>에볼루션</span><span>단계적으로 깊어지는 수련</span></div>
    </div>

    <div class="about-values">
      <div class="value-item">
        <span class="value-num">01</span>
        <span class="value-text">소수 정원 (최대 6명)</span>
      </div>
      <div class="value-item">
        <span class="value-num">02</span>
        <span class="value-text">개인 맞춤 피드백</span>
      </div>
      <div class="value-item">
        <span class="value-num">03</span>
        <span class="value-text">무리 없는 진도</span>
      </div>
    </div>
  </main>

  <footer class="footer">
    <span>© 2026 시월요가</span>
  </footer>

  <script>
    const menuBtn = document.querySelector('.menu-btn');
    const gnb = document.querySelector('.gnb');
    menuBtn.addEventListener('click', () => {
      gnb.classList.toggle('open');
      menuBtn.classList.toggle('active');
    });
    document.querySelectorAll('.gnb a').forEach(a => {
      a.addEventListener('click', () => {
        gnb.classList.remove('open');
        menuBtn.classList.remove('active');
      });
    });
  </script>
</body>
</html>
