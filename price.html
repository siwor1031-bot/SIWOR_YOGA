<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수강료 — 시월요가</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&family=Noto+Sans+KR:wght@100;200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <a href="siwol-yoga.html" class="logo">시월요가</a>
    <nav class="gnb">
      <a href="about.html">소개</a>
      <a href="schedule.html">시간표</a>
      <a href="price.html" class="active">수강료</a>
      <a href="notice.html">유의사항</a>
    </nav>
    <button class="menu-btn" aria-label="메뉴 열기">
      <span></span><span></span>
    </button>
  </header>

  <main class="page-content">
    <h1 class="page-title">수강료</h1>

    <div class="price-block">
      <div class="price-block-row">
        <span class="price-block-label">원데이</span>
        <span class="price-block-value">25,000</span>
      </div>
    </div>

    <div class="price-block">
      <h2 class="price-block-title">1개월</h2>
      <div class="price-block-row">
        <span class="price-block-label">주 2회</span>
        <span class="price-block-value">160,000</span>
      </div>
      <div class="price-block-row">
        <span class="price-block-label">주 3회</span>
        <span class="price-block-value">220,000</span>
      </div>
    </div>

    <div class="price-block">
      <h2 class="price-block-title">3개월 <em>추천</em></h2>
      <div class="price-block-row">
        <span class="price-block-label">주 2회</span>
        <span class="price-block-value">420,000</span>
      </div>
      <div class="price-block-row">
        <span class="price-block-label">주 3회</span>
        <span class="price-block-value">570,000</span>
      </div>
      <div class="price-block-row">
        <span class="price-block-label">주 4회</span>
        <span class="price-block-value">690,000</span>
      </div>
    </div>

    <p class="price-note">6개월 이상 · 개인레슨 별도 문의<br>3개월 등록 시 첫 달 50% 할인 · VAT 포함</p>
  </main>

  <footer class="footer">
    <span>© 2026 시월요가</span>
  </footer>

  <script>
    const menuBtn = document.querySelector('.menu-btn');
    const gnb = document.querySelector('.gnb');
    menuBtn.addEventListener('click', () => {
      gnb.classList.toggle('open');
      menuBtn.classList.toggle('active');
    });
    document.querySelectorAll('.gnb a').forEach(a => {
      a.addEventListener('click', () => {
        gnb.classList.remove('open');
        menuBtn.classList.remove('active');
      });
    });
  </script>
</body>
</html>
